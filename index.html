<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: black;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 80%;
      max-height: 80%;
    }
    img {
      max-width: 100%;
      max-height: 70vh;
      object-fit: contain;
    }
    p {
      margin-top: 10px;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="sillybilly.jpg" alt="swim your fears and problems away">
    <p>billy is silly</p>
  </div>
</body>
</html>
